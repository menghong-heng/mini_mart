# ─────────────────────────────────────────────────────────────
# SentinelDB - Docker Compose (full stack)
#
# Usage:
#   docker compose up --build        ← first run (builds images + inits DB)
#   docker compose up                ← subsequent runs
#   docker compose down -v           ← tear down + wipe DB volume
#
# Services:
#   db       - Oracle Database Free 23ai (port 1521)
#   backend  - FastAPI / uvicorn        (host port 8001)
#   frontend - Vite React dev           (port 5173)
# ─────────────────────────────────────────────────────────────

services:
  # ── Oracle Database ─────────────────────────────────────────
  db:
    image: gvenzl/oracle-free:23-slim
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: oraclepass
      APP_USER: sentineldb
      APP_USER_PASSWORD: sentinelpass
    ports:
      - "1521:1521"
    volumes:
      - oracledata:/opt/oracle/oradata
      # Init scripts run once (alphabetical) on first start
      - ./schema/schema.sql:/container-entrypoint-initdb.d/01_schema.sql:ro
      - ./queries/auth.sql:/container-entrypoint-initdb.d/02_auth.sql:ro
      - ./queries/customer_auth.sql:/container-entrypoint-initdb.d/03_customer_auth.sql:ro
      - ./queries/permissions.sql:/container-entrypoint-initdb.d/04_permissions.sql:ro
      - ./data/seed.sql:/container-entrypoint-initdb.d/05_seed.sql:ro
      # Keep SQL test scripts available after init for manual verification
      - ./queries:/queries:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      ORACLE_USER: sentineldb
      ORACLE_PASSWORD: sentinelpass
      ORACLE_DSN: db:1521/FREEPDB1
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - product_images:/app/static/product-images

  # ── React + Vite Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  oracledata:
  product_images:
